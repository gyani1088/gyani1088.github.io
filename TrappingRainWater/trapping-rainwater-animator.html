<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trapping Rainwater Algorithm Visualizer</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --bar-base: #475569;
            --left-rgba: rgba(248, 113, 113, 0.55);
            --left-solid: #ef4444;
            --right-rgba: rgba(74, 222, 128, 0.55);
            --right-solid: #22c55e;
            --water-solid: #3b82f6;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            align-items: center;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #64748b;
        }

        input {
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--water-solid);
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            color: white;
            margin-top: 18px; /* align with input */
        }

        button:active:not(:disabled) {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #btn-draw { background-color: var(--bar-base); }
        #btn-play { background-color: var(--water-solid); }

        .status-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 40px;
            font-size: 1.1rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-phase {
            font-weight: 600;
            color: #475569;
        }

        .status-res {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--water-solid);
        }

        /* Chart Area */
        #chart-container {
            position: relative;
            height: 350px;
            width: 100%;
            display: flex;
            align-items: flex-end;
            background: #f8fafc;
            border-bottom: 4px solid #cbd5e1;
            padding-top: 50px;
        }

        .column {
            flex: 1;
            height: 100%;
            position: relative;
            display: flex;
            justify-content: center;
        }

        .pointer {
            position: absolute;
            top: -35px;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.2s ease;
            transform: translateY(-10px);
            z-index: 10;
        }

        .pointer.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Array Values Displayed at the bottom */
        .val-label {
            position: absolute;
            bottom: -25px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #64748b;
            text-align: center;
            width: 100%;
        }

        .bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            transition: height 0.3s ease-in-out;
        }

        .bar-base {
            background-color: var(--bar-base);
            z-index: 4;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            padding-bottom: 4px;
        }

        .bar-left {
            background-color: var(--left-rgba);
            z-index: 2;
            height: 0;
        }

        .bar-right {
            background-color: var(--right-rgba);
            z-index: 3;
            height: 0;
        }

        .bar-water {
            background-color: var(--water-solid);
            z-index: 5;
            height: 0;
            opacity: 0;
            transition: height 0.4s ease, opacity 0.2s ease;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 45px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
        }

        .color-box {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .container { padding: 16px; }
            #chart-container { height: 250px; }
            .pointer { font-size: 20px; top: -30px; }
            .controls { flex-direction: column; align-items: stretch; }
            button { margin-top: 0; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Trapping Rainwater Algorithm</h1>
    </header>

    <div class="container">
        <div class="controls">
            <div class="input-group">
                <label for="array-input">Input Array (comma separated)</label>
                <!-- Default matches the Java code arr -->
                <input type="text" id="array-input" value="2, 1, 5, 3, 1, 0, 4" placeholder="e.g. 2, 1, 5, 3, 1, 0, 4">
            </div>
            <button id="btn-draw" onclick="init()">Set Array</button>
            <button id="btn-play" onclick="play()">Play Animation</button>
        </div>

        <div class="status-panel">
            <div class="status-phase" id="phase-text">Phase: Waiting to start...</div>
            <div>Total Water (res): <span class="status-res" id="res-text">0</span></div>
        </div>

        <div id="chart-container">
            <!-- Columns generated by JS -->
        </div>

        <div class="legend">
            <div class="legend-item"><div class="color-box" style="background: var(--bar-base)"></div> arr[i] (Terrain)</div>
            <div class="legend-item"><div class="color-box" style="background: var(--left-rgba)"></div> left[i] Max</div>
            <div class="legend-item"><div class="color-box" style="background: var(--right-rgba)"></div> right[i] Max</div>
            <div class="legend-item"><div class="color-box" style="background: var(--water-solid)"></div> water[i]</div>
        </div>
    </div>

    <script>
        let isAnimating = false;
        
        // Helper sleep function for animation delays
        const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

        function getArray() {
            const raw = document.getElementById('array-input').value;
            const arr = raw.split(',').map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n >= 0);
            return arr.length > 0 ? arr : [2, 1, 5, 3, 1, 0, 4]; // fallback to Java array
        }

        // Sets the travelling pointer to a specific index with a color
        function setPointer(index, color) {
            document.querySelectorAll('.pointer').forEach(p => p.classList.remove('active'));
            if (index >= 0) {
                const ptr = document.getElementById(`pointer-${index}`);
                if (ptr) {
                    ptr.style.color = color;
                    ptr.classList.add('active');
                }
            }
        }

        // Setup the chart initially
        function init() {
            if (isAnimating) return;
            const arr = getArray();
            const container = document.getElementById('chart-container');
            container.innerHTML = '';
            document.getElementById('res-text').innerText = '0';
            document.getElementById('phase-text').innerText = 'Phase: Waiting to start...';
            
            const maxVal = Math.max(...arr, 1); 

            arr.forEach((val, i) => {
                const col = document.createElement('div');
                col.className = 'column';

                const pointer = document.createElement('div');
                pointer.className = 'pointer';
                pointer.id = `pointer-${i}`;
                pointer.innerHTML = '▼';

                const baseBar = document.createElement('div');
                baseBar.className = 'bar bar-base';
                baseBar.style.height = `${(val / maxVal) * 100}%`;
                if(val > 0) baseBar.innerText = val; // Show value inside terrain block if > 0

                const leftBar = document.createElement('div');
                leftBar.className = 'bar bar-left';
                leftBar.id = `left-${i}`;

                const rightBar = document.createElement('div');
                rightBar.className = 'bar bar-right';
                rightBar.id = `right-${i}`;

                const waterBar = document.createElement('div');
                waterBar.className = 'bar bar-water';
                waterBar.id = `water-${i}`;
                // Water starts precisely on top of the terrain
                waterBar.style.bottom = `${(val / maxVal) * 100}%`; 

                const valLabel = document.createElement('div');
                valLabel.className = 'val-label';
                valLabel.innerText = `[${i}]`;

                col.appendChild(pointer);
                col.appendChild(leftBar);
                col.appendChild(rightBar);
                col.appendChild(waterBar);
                col.appendChild(baseBar);
                col.appendChild(valLabel);
                
                container.appendChild(col);
            });
        }

        // Main animation loop
        async function play() {
            if (isAnimating) return;
            const arr = getArray();
            const n = arr.length;
            if (n === 0) return;

            isAnimating = true;
            document.getElementById('btn-draw').disabled = true;
            document.getElementById('btn-play').disabled = true;
            
            init(); // Reset state

            const maxVal = Math.max(...arr, 1);
            let left = new Array(n).fill(0);
            let right = new Array(n).fill(0);
            let minOf2 = new Array(n).fill(0);
            let water = new Array(n).fill(0);
            let res = 0;
            
            const speed = 800; // ms per step (slowed down to 1/2 speed)

            const phaseText = document.getElementById('phase-text');
            const resText = document.getElementById('res-text');

            // ----------------------------------------------------
            // PHASE 1: Fill left array (Matches Java logic precisely)
            // ----------------------------------------------------
            phaseText.innerText = 'Phase 1: Calculating left[] max array';
            
            setPointer(0, 'var(--left-solid)');
            left[0] = arr[0];
            document.getElementById(`left-0`).style.height = `${(left[0] / maxVal) * 100}%`;
            await sleep(speed);

            for (let i = 1; i < n; i++) {
                setPointer(i, 'var(--left-solid)');
                left[i] = Math.max(left[i - 1], arr[i]);
                document.getElementById(`left-${i}`).style.height = `${(left[i] / maxVal) * 100}%`;
                await sleep(speed);
            }

            // ----------------------------------------------------
            // PHASE 2: Fill right array (Matches Java logic precisely)
            // ----------------------------------------------------
            phaseText.innerText = 'Phase 2: Calculating right[] max array';

            setPointer(n - 1, 'var(--right-solid)');
            right[n - 1] = arr[n - 1];
            document.getElementById(`right-${n - 1}`).style.height = `${(right[n - 1] / maxVal) * 100}%`;
            await sleep(speed);

            for (let i = n - 2; i >= 0; i--) {
                setPointer(i, 'var(--right-solid)');
                right[i] = Math.max(right[i + 1], arr[i]);
                document.getElementById(`right-${i}`).style.height = `${(right[i] / maxVal) * 100}%`;
                await sleep(speed);
            }

            // ----------------------------------------------------
            // PHASE 3: Calculate accumulated water element by element
            // (Matches Java Loop: for (int i = 1; i < n - 1; i++))
            // ----------------------------------------------------
            phaseText.innerText = 'Phase 3: Calculating trapped water (minOf2 - arr)';
            
            for (let i = 1; i < n - 1; i++) {
                setPointer(i, 'var(--water-solid)');

                minOf2[i] = Math.min(left[i], right[i]);
                let curr = minOf2[i] - arr[i];
                water[i] = curr;
                
                if (curr > 0) {
                    const wBar = document.getElementById(`water-${i}`);
                    wBar.style.height = `${(curr / maxVal) * 100}%`;
                    wBar.style.opacity = '1';
                    
                    res += curr;
                    resText.innerText = res;
                }
                
                await sleep(speed);
            }

            // Finish up
            setPointer(-1, ''); // Hide pointer
            phaseText.innerText = 'Algorithm Complete!';
            
            isAnimating = false;
            document.getElementById('btn-draw').disabled = false;
            document.getElementById('btn-play').disabled = false;
        }

        // Initialize empty chart on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
