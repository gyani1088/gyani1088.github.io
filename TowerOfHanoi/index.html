<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi - Smooth Animation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
            margin-top: 40px;
        }
        .controls {
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        input[type="number"] {
            width: 50px;
            padding: 5px;
            margin: 0 10px;
        }
        button {
            padding: 7px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #1976D2;
        }
        canvas {
            background-color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label for="diskCount">Enter number of disks (3-8): </label>
        <input type="number" id="diskCount" min="3" max="8" value="4">
        <button onclick="initHanoi()">Start Animation</button>
    </div>

    <canvas id="hanoiCanvas" width="700" height="400"></canvas>

    <script>
        const canvas = document.getElementById('hanoiCanvas');
        const ctx = canvas.getContext('2d');
        
        let pegs = [[], [], []];
        let moves = [];
        let moveIndex = 0;
        let numDisks = 0;
        
        // Animation Configuration
        let animationFrameId = null;
        let movingDisk = null; 
        let nextMoveTimestamp = 0;
        const phaseDuration = 250; // Milliseconds per movement phase (Up, Across, Down)
        const postMoveDelay = 150; // Rest time (ms) between consecutive disk moves

        // Dimensions & coordinates (scoped globally to be accessible across updates/draws)
        let pegX = [];
        let baseY = 0;
        let maxDiskWidth = 0;
        const minDiskWidth = 30;
        let diskHeight = 0;
        
        const diskColors = [
            "#4CAF50", "#2196F3", "#FF9800", "#9C27B0", 
            "#F44336", "#3F51B5", "#00BCD4", "#8BC34A"
        ];

        function initHanoi() {
            // Stop any active animation loops
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            // Get and clamp input values
            let inputVal = parseInt(document.getElementById('diskCount').value, 10);
            numDisks = Math.max(3, Math.min(8, inputVal || 3));
            document.getElementById('diskCount').value = numDisks;

            // Recalculate size proportions dynamically
            const w = canvas.width;
            const h = canvas.height;
            baseY = h - 40;
            pegX = [w / 6, w / 2, w * 5 / 6];
            maxDiskWidth = w / 5;
            diskHeight = Math.max(16, (baseY - (baseY - 200)) / Math.max(6, numDisks));

            // Populate starting peg
            pegs = [[], [], []];
            for (let size = numDisks; size >= 1; size--) {
                pegs[0].push(size);
            }

            // Generate programmatic moves solution
            moves = [];
            moveIndex = 0;
            generateMoves(numDisks, 0, 2, 1);

            // Reset step animation properties
            movingDisk = null;
            nextMoveTimestamp = performance.now() + 300; // Initial start delay

            // Start the 60 FPS animation render loop
            requestAnimationFrame(animationLoop);
        }

        function generateMoves(n, from, to, aux) {
            if (n === 0) return;
            generateMoves(n - 1, from, aux, to);
            moves.push({ disk: n, from: from, to: to });
            generateMoves(n - 1, aux, to, from);
        }

        // Quadratic Easing function for smooth acceleration and deceleration
        function easeInOutQuad(t) {
            return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        }

        function animationLoop(timestamp) {
            updateAnimation(timestamp);
            drawPanel();
            animationFrameId = requestAnimationFrame(animationLoop);
        }

        function updateAnimation(timestamp) {
            // If waiting during a rest delay block, skip updating position state
            if (timestamp < nextMoveTimestamp) return;

            // If no disk is currently traveling through the air, prepare the next move
            if (movingDisk === null) {
                if (moveIndex >= moves.length) return; // Sequence completed

                const m = moves[moveIndex];
                if (pegs[m.from].length > 0) {
                    const size = pegs[m.from].pop(); // Detach from stack to animate freely

                    // Calculate source and target coordinates based on stack depth heights
                    const startX = pegX[m.from];
                    const startY = baseY - (pegs[m.from].length + 1) * diskHeight;
                    const targetX = pegX[m.to];
                    const targetY = baseY - (pegs[m.to].length + 1) * diskHeight;
                    const clearanceY = baseY - 230; // Apex height safely clearing peg tops

                    movingDisk = {
                        size: size,
                        x: startX,
                        y: startY,
                        startX: startX,
                        startY: startY,
                        targetX: targetX,
                        targetY: targetY,
                        clearanceY: clearanceY,
                        phase: 'UP', // Phases: 'UP', 'ACROSS', 'DOWN'
                        phaseStartTime: timestamp
                    };
                }
            } else {
                // Animate the active travelling disk
                let elapsed = timestamp - movingDisk.phaseStartTime;
                let t = Math.min(elapsed / phaseDuration, 1);
                let easedT = easeInOutQuad(t);

                switch (movingDisk.phase) {
                    case 'UP':
                        movingDisk.y = movingDisk.startY + (movingDisk.clearanceY - movingDisk.startY) * easedT;
                        if (t === 1) {
                            movingDisk.phase = 'ACROSS';
                            movingDisk.phaseStartTime = timestamp;
                        }
                        break;
                    case 'ACROSS':
                        movingDisk.x = movingDisk.startX + (movingDisk.targetX - movingDisk.startX) * easedT;
                        if (t === 1) {
                            movingDisk.phase = 'DOWN';
                            movingDisk.phaseStartTime = timestamp;
                        }
                        break;
                    case 'DOWN':
                        movingDisk.y = movingDisk.clearanceY + (movingDisk.targetY - movingDisk.clearanceY) * easedT;
                        if (t === 1) {
                            // Landed! Reattach back to destination peg array structure
                            pegs[moves[moveIndex].to].push(movingDisk.size);
                            movingDisk = null;
                            moveIndex++;
                            nextMoveTimestamp = timestamp + postMoveDelay; // Enforce brief resting pause
                        }
                        break;
                }
            }
        }

        // Modular design function to handle independent component drawing
        function drawSingleDisk(diskSize, centerX, centerY) {
            const widthDisk = minDiskWidth + (diskSize - 1) * ((maxDiskWidth - minDiskWidth) / Math.max(1, numDisks - 1));
            const x = centerX - widthDisk / 2;

            ctx.fillStyle = diskColors[(diskSize - 1) % diskColors.length];
            ctx.strokeStyle = "black";
            ctx.lineWidth = 1;

            roundRect(ctx, x, centerY, widthDisk, diskHeight - 2, 10);
            ctx.fill();
            ctx.stroke();

            // Render disk numerical inner ID identifiers
            ctx.fillStyle = "white";
            ctx.font = "bold 12px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(diskSize.toString(), centerX, centerY + (diskHeight - 2) / 2);
        }

        function roundRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function drawPanel() {
            const w = canvas.width;
            const h = canvas.height;

            // Clear frame canvas background
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, w, h);

            const pegWidth = 8;

            // Draw structural static bases and pegs
            ctx.fillStyle = "darkgray";
            for (let i = 0; i < 3; i++) {
                ctx.fillRect(pegX[i] - w / 12, baseY + 10, w / 6, 8); // base
                ctx.fillRect(pegX[i] - pegWidth / 2, baseY - 200, pegWidth, 200); // peg
            }

            // Draw all currently static stacked resting disks
            for (let i = 0; i < 3; i++) {
                const stack = pegs[i];
                for (let depth = 0; depth < stack.length; depth++) {
                    const diskSize = stack[depth];
                    const centerY = baseY - (depth + 1) * diskHeight;
                    drawSingleDisk(diskSize, pegX[i], centerY);
                }
            }

            // Layer-draw traveling isolated fluid disk over backgrounds
            if (movingDisk !== null) {
                drawSingleDisk(movingDisk.size, movingDisk.x, movingDisk.y);
            }
        }

        // Initialize display configuration metrics immediately on application load
        const w = canvas.width;
        const h = canvas.height;
        baseY = h - 40;
        pegX = [w / 6, w / 2, w * 5 / 6];
        maxDiskWidth = w / 5;
        diskHeight = Math.max(16, (baseY - (baseY - 200)) / 6);
        drawPanel();
    </script>
</body>
</html>
